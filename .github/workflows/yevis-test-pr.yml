name: "yevis-test-pr"

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

# https://docs.github.com/ja/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
permissions:
  pull-requests: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: "Download yevis binary from artifact"
        id: download-binary-artifact
        run: |
          RUN_ID=`gh run --repo sapporo-wes/yevis-cli list --workflow build_binary --json databaseId --jq .[0].databaseId`
          gh run --repo sapporo-wes/yevis-cli download ${RUN_ID} -n yevis
          chmod +x yevis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: "Download yevis binary from release"
        if: ${{ steps.download-binary-artifact.outcome != 'success' }}
        run: |
          ARCH=$(uname -m)
          # Normalize aarch64 -> arm64 to match release naming
          if [ "${ARCH}" = "aarch64" ]; then ARCH="arm64"; fi
          curl -fsSL -o yevis https://github.com/sapporo-wes/yevis-cli/releases/download/0.5.9/yevis_${ARCH}
          chmod +x ./yevis

      - name: "Run Sapporo-WES docker compose"
        run: |
          git clone https://github.com/rodtheo/sapporo-wes
          cd sapporo-wes
          docker compose up -d
          # Wait for the API to be ready
          cd ..
          timeout 60 bash -c 'until curl -sf http://localhost:1122/service-info; do sleep 2; done'

      - name: "Run tests"
        id: test
        run: |
          mkdir -p ./test-logs ./test-results
          SAPPORO_RUN_DIR=${GITHUB_WORKSPACE}/test-results \
            ./yevis test \
              -w http://localhost:1122/ \
              --verbose \
              --fetch-ro-crate \
              --from-pr ${{github.event.pull_request._links.html.href }} \
              2>&1 | tee ./test-logs/yevis-log.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "List test results"
        run: sudo ls -lR ./test-results > ./test-logs/test-results-list.txt

      - name: "Upload test logs"
        uses: actions/upload-artifact@v4
        with:
          name: yevis-test-logs
          path: test-logs/*
          if-no-files-found: ignore

      - name: "Comment to the pull request"
        run: |
          if [[ "${{ steps.test.outcome }}" == "success" ]]; then
            gh pr --repo ${{ github.repository }} edit ${{ github.event.pull_request.number }} --remove-label invalid
          else
            gh pr --repo ${{ github.repository }} edit ${{ github.event.pull_request.number }} --add-label invalid
          fi
          COMMENT=$(cat <<EOF
          ## Test results
          - Test status: ${{ steps.test.outcome }}
          - Test URL: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
            - Test logs artifact: yevis-test-logs
          EOF
          )
          gh pr --repo ${{ github.repository }} comment ${{ github.event.pull_request.number }} --body "${COMMENT}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Check test status"
        if: ${{ steps.test.outcome != 'success' }}
        run: exit 1
